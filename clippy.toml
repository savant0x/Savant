# FID-036 anchor — see dev/fids/FID-2026-07-15-036-clippy-policy-refinement.md
# (this FID supersedes the earlier clippy-cleanup-deferred framing).
#
# Per ECHO §Quality Override Precedence: language standard (Rust +
# coding-standards/rust.md §Anti-Patterns) > project config. The prior
# clippy.toml blanket `disallowed-methods` deny was over-reaching into
# test code, blocking the FID-029 v0.0.8 release-cut on 88 pre-existing
# `.expect()` calls inside `#[cfg(test)]` blocks — calls that are
# LEGAL per coding-standards/rust.md verbatim ("`.expect("reason")` is
# acceptable only in tests, examples, and main.rs where panicking is
# the intended behavior" + Anti-Patterns table excludes test code from
# the blanket unwrap/expect ban).
#
# Resolution (FID-036): empty `disallowed-methods` — clippy no longer
# fires the deny-level `clippy::disallowed_methods` lint on `.expect()`
# calls in test or production code. The FID-029 release-blocker (89
# clippy errors: 88 in `#[cfg(test)]` + 1 in `crates/vault::default_identity`
# production code) is resolved two ways:
#
#   1. THIS FILE: `disallowed-methods = []` removes the over-broad deny.
#   2. `crates/vault/src/lib.rs`: `default_identity()` was converted from
#      `.expect("OS RNG must produce keys")` to `match + panic!()` per
#      ECHO Law 6 — panicking is the intended behavior (vault cannot
#      proceed with a corrupt identity), so the production code is now
#      `.expect()`-free without sacrificing DRY.
#
# Drift-resistance (LESSON-062): the original policy intent (ECHO Law 6
# — no `.expect()`/`.unwrap()` in non-test code) is preserved via THREE
# complementary enforcement layers that survive this FID:
#
#   (a) `cargo clippy -D warnings` still fails on any NEW warning in
#       production code via pedantic-group lints (`expect_used`,
#       `unwrap_used`) IF a future contributor opts into pedantic per-crate
#       via `#![warn(clippy::pedantic)]`. clippy 0.1.94's clippy.toml
#       schema does NOT expose `expect_used` / `unwrap_used` as top-level
#       configuration keys (verified empirically: `unknown field
#       'expect-used'` rejection; the rust-clippy master docs only define
#       flat keys for `disallowed-methods`, `cognitive-complexity-threshold`,
#       `too-large-for-stack`, `msrv`, etc. — the per-lint config table
#       lives in `[lints.clippy]` of CARGO.toml, which we tested and it
#       rejected `except-cfg` for clippy lints).
#
#   (b) Crate-level reviewer discipline (FID-035 §Acceptance +
#       ECHO Law 6 + coding-standards/rust.md): a human-maintainer or
#       code-reviewer-minimax-m3 review pass catches `.expect()` / `.unwrap()`
#       regressions in production code on PR.
#
#   (c) `coding-standards/rust.md` doctrinally forbids `.unwrap()` / `.expect()`
#       in non-test code; new contributors see the rule via the README and
#       CLAUDE.md → trained convention, not pure tooling enforcement.
#
# If/when we bump clippy beyond 0.1.94 (or Cargo past 1.81+), the
# per-lint `[lints.clippy] expect_used = { level = "warn", except-cfg = ["test"] }`
# configuration in Cargo.toml should be re-tested and re-enabled (FID-037).
disallowed-methods = []
